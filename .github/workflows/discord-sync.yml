name: Sync Discord to Firestore

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 4 AM UTC
  workflow_dispatch:        # also triggerable manually from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies (provides firebase-admin)
        run: npm ci --prefix server

      - name: Sync Discord data to Firestore
        run: node scripts/sync-discord.cjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
