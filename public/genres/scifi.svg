<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a828"/>
      <stop offset="100%" stop-color="#5aabdd"/>
    </linearGradient>
  </defs>
  <!-- Planet -->
  <circle cx="20" cy="20" r="9" stroke="url(#g)" stroke-width="2.2"/>
  <!-- Ring -->
  <ellipse cx="20" cy="20" rx="16" ry="5.5" stroke="url(#g)" stroke-width="2" stroke-dasharray="0"/>
  <!-- Mask the ring behind the planet (left and right visible) -->
  <path d="M4 20 Q10 14.5 20 14.5 Q30 14.5 36 20" stroke="url(#g)" stroke-width="2.2" fill="none" opacity="0"/>
  <!-- Star dots -->
  <circle cx="7" cy="8" r="1.2" fill="url(#g)"/>
  <circle cx="33" cy="10" r="1" fill="url(#g)"/>
  <circle cx="11" cy="33" r="1" fill="url(#g)"/>
  <circle cx="32" cy="32" r="1.2" fill="url(#g)"/>
</svg>
