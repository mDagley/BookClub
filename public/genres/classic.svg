<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a828"/>
      <stop offset="100%" stop-color="#5aabdd"/>
    </linearGradient>
  </defs>
  <!-- Scroll body -->
  <rect x="10" y="12" width="20" height="22" rx="2" stroke="url(#g)" stroke-width="2.5" fill="url(#g)" fill-opacity="0.12"/>
  <!-- Top roll -->
  <ellipse cx="20" cy="12" rx="10" ry="4" stroke="url(#g)" stroke-width="2.5" fill="url(#g)" fill-opacity="0.2"/>
  <!-- Bottom roll -->
  <ellipse cx="20" cy="34" rx="10" ry="4" stroke="url(#g)" stroke-width="2.5" fill="url(#g)" fill-opacity="0.2"/>
  <!-- Two text lines -->
  <line x1="14" y1="20" x2="26" y2="20" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="26" x2="23" y2="26" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
</svg>
