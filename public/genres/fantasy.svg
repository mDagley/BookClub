<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a828"/>
      <stop offset="100%" stop-color="#5aabdd"/>
    </linearGradient>
  </defs>
  <!-- Sword blade -->
  <line x1="20" y1="5" x2="20" y2="30" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cross-guard -->
  <line x1="10" y1="19" x2="30" y2="19" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="20" cy="34" r="3" stroke="url(#g)" stroke-width="2"/>
  <!-- Tip accent -->
  <circle cx="20" cy="5" r="1.5" fill="url(#g)"/>
  <!-- Small sparkle left -->
  <line x1="8" y1="10" x2="8" y2="14" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="12" x2="10" y2="12" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small sparkle right -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="10" x2="34" y2="10" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
