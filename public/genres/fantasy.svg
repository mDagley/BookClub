<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a828"/>
      <stop offset="100%" stop-color="#5aabdd"/>
    </linearGradient>
  </defs>
  <!-- Crown base band -->
  <rect x="6" y="26" width="28" height="8" rx="2" stroke="url(#g)" stroke-width="2.5" fill="url(#g)" fill-opacity="0.15"/>
  <!-- Crown points - left, center, right -->
  <polyline points="6,26 6,12 13,20 20,8 27,20 34,12 34,26" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="url(#g)" fill-opacity="0.15"/>
  <!-- Gem dots on points -->
  <circle cx="6"  cy="12" r="2.5" fill="url(#g)"/>
  <circle cx="20" cy="8"  r="2.5" fill="url(#g)"/>
  <circle cx="34" cy="12" r="2.5" fill="url(#g)"/>
</svg>
